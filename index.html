<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Arquitectura de Software</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 🔐 LOGIN INICIAL -->
<div id="pantallaLogin" class="center">

    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Universidad_Peruana_Los_Andes_logo.png" width="120">

    <h1>Arquitectura de Software</h1>

    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
    <button onclick="mostrarRegistro()">Registrarse</button>
    <button onclick="modoInvitado()">Entrar como invitado</button>

</div>

<!-- 🧭 PANEL PRINCIPAL -->
<div id="panel" style="display:none;">

    <nav>
        <h2>Menú</h2>
        <button onclick="inicio()">Inicio</button>
        <button onclick="verSemana(1)">Semana 1</button>
        <button onclick="verSemana(2)">Semana 2</button>
        <button onclick="verSemana(3)">Semana 3</button>
        <button onclick="verSemana(4)">Semana 4</button>
        <button onclick="verSemana(5)">Semana 5</button>
        <button onclick="verSemana(6)">Semana 6</button>
        <button onclick="verSemana(7)">Semana 7</button>
        <button onclick="verSemana(8)">Semana 8</button>
        <button onclick="verSemana(9)">Semana 9</button>
    </nav>

    <div id="contenido"></div>

</div>

<!-- 📝 REGISTRO -->
<div id="registro" class="center" style="display:none;">
    <h2>Registro</h2>
    <input type="text" id="newUser" placeholder="Usuario">
    <input type="password" id="newPass" placeholder="Contraseña">
    <button onclick="registrar()">Crear cuenta</button>
</div>

<script src="script.js"></script>
</body>
</html>
